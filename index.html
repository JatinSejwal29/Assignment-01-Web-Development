<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Smart Event Dashboard</title>
    <link rel="stylesheet" href="style.css" />
    <link
        href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap"
        rel="stylesheet" />
</head>

<body>

    <!-- ══════════════════════════════════════════
       ANIMATED BACKGROUND BLOBS
  ══════════════════════════════════════════ -->
    <div class="bg-layer" aria-hidden="true">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
        <div class="blob blob-3"></div>
        <div class="grid-overlay"></div>
    </div>

    <!-- ══════════════════════════════════════════
       TOP HEADER
  ══════════════════════════════════════════ -->
    <header class="site-header">
        <div class="header-inner">
            <div class="header-icon" aria-hidden="true">
                <svg viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <circle cx="20" cy="20" r="18" stroke="#A4F000" stroke-width="2.5" />
                    <path d="M13 20L18 25L27 15" stroke="#A4F000" stroke-width="2.5" stroke-linecap="round"
                        stroke-linejoin="round" />
                </svg>
            </div>
            <h1 class="site-title">Smart Event Dashboard</h1>
            <div class="header-badge">
                <span class="badge-dot"></span>
                Live
            </div>
        </div>
        <div class="header-accent-line"></div>
    </header>

    <!-- ══════════════════════════════════════════
       MAIN DASHBOARD
  ══════════════════════════════════════════ -->
    <main class="dashboard">

        <!-- LEFT CARD — Add New Event -->
        <section class="card card-form" aria-label="Add New Event">
            <div class="card-header">
                <div class="card-icon teal-icon" aria-hidden="true">
                    <svg viewBox="0 0 24 24" fill="none">
                        <path d="M12 5v14M5 12h14" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" />
                    </svg>
                </div>
                <h2 class="card-title">Add New Event</h2>
            </div>
            <div class="card-divider"></div>

            <div class="form-body">
                <!-- Event Title -->
                <div class="field-group">
                    <label class="field-label" for="event-title">
                        <svg viewBox="0 0 16 16" fill="none" class="label-icon">
                            <rect x="2" y="4" width="12" height="1.5" rx="0.75" fill="currentColor" />
                            <rect x="2" y="7.25" width="8" height="1.5" rx="0.75" fill="currentColor" />
                            <rect x="2" y="10.5" width="10" height="1.5" rx="0.75" fill="currentColor" />
                        </svg>
                        Event Title
                    </label>
                    <input type="text" id="event-title" class="field-input" placeholder="e.g. Team Sprint Planning"
                        autocomplete="off" />
                </div>

                <!-- Event Date -->
                <div class="field-group">
                    <label class="field-label" for="event-date">
                        <svg viewBox="0 0 16 16" fill="none" class="label-icon">
                            <rect x="2" y="3" width="12" height="11" rx="2" stroke="currentColor" stroke-width="1.4" />
                            <path d="M2 7h12" stroke="currentColor" stroke-width="1.4" />
                            <path d="M5 2v2M11 2v2" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" />
                        </svg>
                        Event Date
                    </label>
                    <input type="date" id="event-date" class="field-input" />
                </div>

                <!-- Category -->
                <div class="field-group">
                    <label class="field-label" for="event-category">
                        <svg viewBox="0 0 16 16" fill="none" class="label-icon">
                            <circle cx="5" cy="5" r="2.5" stroke="currentColor" stroke-width="1.4" />
                            <circle cx="11" cy="5" r="2.5" stroke="currentColor" stroke-width="1.4" />
                            <circle cx="8" cy="11" r="2.5" stroke="currentColor" stroke-width="1.4" />
                        </svg>
                        Category
                    </label>
                    <div class="select-wrapper">
                        <select id="event-category" class="field-input field-select">
                            <option value="">Select a category…</option>
                            <option value="Work">💼 Work</option>
                            <option value="Personal">🌿 Personal</option>
                            <option value="Meeting">📋 Meeting</option>
                            <option value="Reminder">🔔 Reminder</option>
                            <option value="Conference">🎤 Conference</option>
                        </select>
                        <div class="select-arrow" aria-hidden="true">
                            <svg viewBox="0 0 10 6" fill="none">
                                <path d="M1 1l4 4 4-4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"
                                    stroke-linejoin="round" />
                            </svg>
                        </div>
                    </div>
                </div>

                <!-- Description -->
                <div class="field-group">
                    <label class="field-label" for="event-desc">
                        <svg viewBox="0 0 16 16" fill="none" class="label-icon">
                            <rect x="2" y="2" width="12" height="12" rx="2" stroke="currentColor" stroke-width="1.4" />
                            <path d="M5 5.5h6M5 8h6M5 10.5h4" stroke="currentColor" stroke-width="1.4"
                                stroke-linecap="round" />
                        </svg>
                        Description
                    </label>
                    <textarea id="event-desc" class="field-input field-textarea"
                        placeholder="What's this event about?"></textarea>
                </div>

                <!-- Submit Button -->
                <button id="btn-add-event" class="btn btn-primary" type="button">
                    <span class="btn-ripple"></span>
                    <svg viewBox="0 0 20 20" fill="none" class="btn-icon">
                        <path d="M10 4v12M4 10h12" stroke="currentColor" stroke-width="2" stroke-linecap="round" />
                    </svg>
                    Add Event
                </button>

                <!-- Success Toast -->
                <div id="success-toast" class="success-toast" aria-live="polite" role="status"></div>
            </div>
        </section>

        <!-- RIGHT CARD — My Events -->
        <section class="card card-events" aria-label="My Events">
            <div class="card-header">
                <div class="card-icon lime-icon" aria-hidden="true">
                    <svg viewBox="0 0 24 24" fill="none">
                        <path d="M8 6h13M8 12h13M8 18h13M3 6h.01M3 12h.01M3 18h.01" stroke="currentColor"
                            stroke-width="2.2" stroke-linecap="round" />
                    </svg>
                </div>
                <h2 class="card-title">My Events</h2>
                <span id="event-count" class="event-count-badge">0</span>
            </div>
            <div class="card-divider"></div>

            <!-- Action Buttons -->
            <div class="action-row">
                <button id="btn-clear" class="btn btn-outline btn-sm" type="button">
                    <svg viewBox="0 0 20 20" fill="none" class="btn-icon">
                        <path d="M4 5h12M8 5V4a1 1 0 011-1h2a1 1 0 011 1v1M6 5l1 11h6l1-11" stroke="currentColor"
                            stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" />
                    </svg>
                    Clear All
                </button>
                <button id="btn-samples" class="btn btn-secondary btn-sm" type="button">
                    <svg viewBox="0 0 20 20" fill="none" class="btn-icon">
                        <path d="M10 3v14M3 10h14" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" />
                    </svg>
                    Add Samples
                </button>
            </div>

            <!-- Events List -->
            <div id="events-list" class="events-list" role="list">
                <!-- Empty state -->
                <div class="empty-state" id="empty-state">
                    <div class="empty-icon" aria-hidden="true">
                        <svg viewBox="0 0 64 64" fill="none">
                            <circle cx="32" cy="32" r="28" stroke="#006D5B" stroke-width="2" stroke-dasharray="6 4"
                                opacity="0.4" />
                            <path d="M22 32h20M32 22v20" stroke="#A4F000" stroke-width="2.5" stroke-linecap="round"
                                opacity="0.6" />
                        </svg>
                    </div>
                    <p class="empty-title">No events yet</p>
                    <p class="empty-sub">Add your first event or load samples to get started</p>
                </div>
            </div>
        </section>

    </main>

    <!-- ══════════════════════════════════════════
       BOTTOM — DOM MANIPULATION DEMO
  ══════════════════════════════════════════ -->
    <section class="card card-dom" aria-label="DOM Manipulation Demo">
        <div class="card-header">
            <div class="card-icon teal-icon" aria-hidden="true">
                <svg viewBox="0 0 24 24" fill="none">
                    <rect x="3" y="5" width="18" height="14" rx="2" stroke="currentColor" stroke-width="2" />
                    <path d="M9 9l-2 2 2 2M15 9l2 2-2 2M11 15l2-6" stroke="currentColor" stroke-width="1.8"
                        stroke-linecap="round" stroke-linejoin="round" />
                </svg>
            </div>
            <h2 class="card-title">DOM Manipulation Demo</h2>
        </div>
        <div class="card-divider"></div>
        <div class="key-display-wrap">
            <div class="key-display" id="key-display" aria-live="polite" aria-label="Last key pressed">
                <span class="key-label">You Pressed:</span>
                <span class="key-value" id="key-value">—</span>
                <span class="key-hint">Press any key on your keyboard</span>
            </div>
        </div>
    </section>

    <script src="script.js"></script>
</body>

</html>
